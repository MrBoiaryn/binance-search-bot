<div class="app-wrapper">
  <app-header
    [settings]="settings"
    (openSettings)="isSettingsOpen = true"
    (openHelp)="isHelpOpen = true">
  </app-header>

  <div class="signals-header">
    <h2 class="title-row">
      <div class="status-badge">
        <span class="dot"></span>
        📡 Активні сигнали: <span class="count">{{ signalsList.length }}</span>
      </div>
    </h2>
  </div>

  <div class="signals-grid">
    @for (sig of signalsList; track sig.symbol + '_' + sig.timeframe; let idx = $index) {
      <app-signal-card
        [sig]="sig"
        [index]="idx"
        [marketType]="settings.marketType">
      </app-signal-card>
    } @empty {
      <div class="empty-state">
        <div class="icon">🔭</div>
        Чекаємо на аномальний об'єм... Поки що тиша.
      </div>
    }
  </div>

  <app-history-table
    [history]="displayHistory"
    [totalPnL]="displayPnL"
    [availableTfs]="settings.timeframes"
    [activeFilter]="activeHistoryFilter"
    (filterChanged)="setHistoryFilter($event)"
    (clearHistory)="onClearHistory()">
  </app-history-table>

  <app-settings-dialog
    [settings]="settings"
    [isOpen]="isSettingsOpen"
    (save)="onSettingsUpdated($event); isSettingsOpen = false"
    (close)="isSettingsOpen = false">
  </app-settings-dialog>

  <app-help-dialog [isOpen]="isHelpOpen" (close)="isHelpOpen = false"></app-help-dialog>
</div>
