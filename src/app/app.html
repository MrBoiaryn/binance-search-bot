<div class="app-wrapper">
  <app-header
    [settings]="settings"
    (settingsChanged)="onSettingsUpdated($event)">
  </app-header>

  <div class="signals-header">
    <h2 class="title-row">
      <div class="status-badge">
        <span class="dot"></span>
        📡 Активні сигнали: <span class="count">{{ signalsList.length }}</span>
      </div>
    </h2>
  </div>

  <div class="signals-grid">
    @for (sig of signalsList; track sig.symbol) {
      <app-signal-card
        [sig]="sig"
        [marketType]="settings.marketType">
      </app-signal-card>
    } @empty {
      <div class="empty-state">
        <div class="icon">🔭</div>
        Чекаємо на аномальний об'єм... Поки що тиша.
      </div>
    }
  </div>

  <app-history-table
    [history]="lastSignalsHistory"
    [marketType]="settings.marketType"
    (clearHistory)="onClearHistory()">
  </app-history-table>
</div>
