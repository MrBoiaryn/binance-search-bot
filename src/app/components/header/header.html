<div class="header-container">
  <div class="header-top">
    <div class="brand">
      <span class="logo-icon">🎯</span>
      <div class="brand-text">
        <h2>Sniper PRO <span class="badge">MAX PACKAGE</span></h2>
        <p class="sub-text">Advanced Market Scanner v3.0</p>
      </div>
    </div>
    <div class="status-panel">
      <div class="status-item">
        <span class="dot online"></span> Статус: <b>Online</b>
      </div>
      <button class="apply-btn" (click)="apply()">ЗАСТОСУВАТИ ЗМІНИ</button>
    </div>
  </div>

  <div class="settings-main-grid">
    <div class="settings-section">
      <h3 class="section-title">🌐 Ринок & Час</h3>
      <div class="input-block">
        <label>Тип торгівлі</label>
        <select [(ngModel)]="localSettings.marketType">
          <option value="futures">Futures (USD-M)</option>
          <option value="spot">Spot Market</option>
        </select>
      </div>
      <div class="tf-selection-label">Таймфрейми (max 3)</div>
      <div class="tf-grid">
        @for (tf of timeframes; track tf) {
          <label class="tf-chip" [class.active]="isTfSelected(tf)">
            <input type="checkbox" [checked]="isTfSelected(tf)" (change)="onTfChange(tf, $event)">
            {{ tf }}
          </label>
        }
      </div>
    </div>

    <div class="settings-section">
      <h3 class="section-title">📊 Технічні параметри</h3>

      <div class="params-row">
        <div class="input-block">
          <label>Swing (Бари)</label>
          <input type="number" [(ngModel)]="localSettings.swingPeriod" title="Глибина пошуку екстремумів">
        </div>
        <div class="input-block">
          <label>Trailing (Бари)</label>
          <input type="number" [(ngModel)]="localSettings.trailingBars">
        </div>
      </div>

      <div class="params-row">
        <div class="input-block">
          <label>Об'єм Min (x)</label>
          <input type="number" [(ngModel)]="localSettings.minVolMult" step="0.1">
        </div>
        <div class="input-block">
          <label>Об'єм Max (x)</label>
          <input type="number" [(ngModel)]="localSettings.maxVolMult" step="0.1">
        </div>
      </div>

      <div class="params-row">
        <div class="input-block">
          <label>Swing Min (%)</label>
          <input type="number" [(ngModel)]="localSettings.minSwing" step="0.1">
        </div>
        <div class="input-block">
          <label>Swing Max (%)</label>
          <input type="number" [(ngModel)]="localSettings.maxSwing" step="0.1">
        </div>
      </div>

      <div class="params-row">
        <div class="input-block">
          <label>R/R Min</label>
          <input type="number" [(ngModel)]="localSettings.minRR" step="0.1" title="Мінімальне співвідношення ризик/прибуток">
        </div>
        <div class="input-block">
          <label>R/R Max</label>
          <input type="number" [(ngModel)]="localSettings.maxRR" step="0.1" title="Максимальна жадібність (обмеження Тейка)">
        </div>
      </div>

      <div class="params-row">
        <div class="input-block">
          <label>L Strength Min</label>
          <input type="number" [(ngModel)]="localSettings.minLvlStrength" step="0.1">
        </div>
        <div class="input-block">
          <label>Кластер (Max)</label>
          <input type="number" [(ngModel)]="localSettings.maxClusterSize" step="1">
        </div>
      </div>

      <div class="params-row">
        <div class="input-block">
          <label>Min profit %</label>
          <input type="number" [(ngModel)]="localSettings.minProfitThreshold" step="0.1">
        </div>
      </div>
    </div>

    <div class="settings-section">
      <h3 class="section-title">⚙️ Стратегія & Візуал</h3>
      <div class="strategy-toggles">
        <label class="toggle-card" [class.active]="localSettings.useDivergence">
          <input type="checkbox" [(ngModel)]="localSettings.useDivergence">
          <div class="toggle-info">
            <span class="icon">💎</span>
            <span class="name">AO Divergence</span>
          </div>
        </label>

        <div class="direction-toggles">
          <label class="dir-btn long" [class.active]="localSettings.showLong">
            <input type="checkbox" [(ngModel)]="localSettings.showLong"> 📈 LONG
          </label>
          <label class="dir-btn short" [class.active]="localSettings.showShort">
            <input type="checkbox" [(ngModel)]="localSettings.showShort"> 📉 SHORT
          </label>
        </div>
      </div>

      <div class="misc-settings">
        <label class="simple-check">
          <input type="checkbox" [(ngModel)]="localSettings.soundEnabled"> 🔊 Звукові сповіщення
        </label>
        <label class="simple-check">
          <input type="checkbox" [(ngModel)]="localSettings.holdStale"> 👻 Показувати "Привидів"
        </label>
      </div>

      <div class="tp-grid-settings" style="margin-top: 15px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
          <label class="simple-check" style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: bold; color: #eaecef;">
            <input type="checkbox" [(ngModel)]="localSettings.useTPGrid"> 🎯 Take Profit Grid
          </label>
          <button *ngIf="localSettings.useTPGrid && localSettings.tpGrid.length < 10" (click)="addTpLevel()"
                  style="background: #0ecb81; border: none; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 10px; cursor: pointer;">
            + Add
          </button>
        </div>

        <div *ngIf="localSettings.useTPGrid">
          <div class="grid-table" style="font-size: 10px;">
            <div style="display: grid; grid-template-columns: 2fr 2fr 1fr 0.5fr; gap: 5px; color: #848e9c; margin-bottom: 5px; padding: 0 5px;">
              <span>Move %</span>
              <span>Vol %</span>
              <span>BE</span>
              <span></span>
            </div>

            <div *ngFor="let level of localSettings.tpGrid; let i = index"
                 style="display: grid; grid-template-columns: 2fr 2fr 1fr 0.5fr; gap: 5px; align-items: center; margin-bottom: 4px; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 4px;">
              <input type="number" [(ngModel)]="level.movePercent" style="background: transparent; border: 1px solid #474d57; color: #fff; width: 100%; padding: 2px; border-radius: 3px;">
              <input type="number" [(ngModel)]="level.volumePercent" style="background: transparent; border: 1px solid #474d57; color: #fff; width: 100%; padding: 2px; border-radius: 3px;">
              <input type="checkbox" [(ngModel)]="level.triggerBE" (change)="onBeToggle(i)" style="cursor: pointer;">
              <span (click)="removeTpLevel(i)" style="color: #f6465d; cursor: pointer; text-align: center; font-weight: bold;">×</span>
            </div>
          </div>

          <div *ngIf="isVolumeInvalid" style="color: #f6465d; font-size: 9px; margin-top: 5px; display: flex; align-items: center; gap: 4px;">
            ⚠️ Total volume: {{ totalTpVolume | number:'1.0-1' }}% (must be 100%)
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
