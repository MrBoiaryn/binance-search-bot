<div class="header-container">
  <div class="header-top">
    <div class="brand">
      <span class="logo-icon">🎯</span>
      <div class="brand-text">
        <h2>Sniper PRO <span class="badge">MAX PACKAGE</span></h2>
        <p class="sub-text">Advanced Market Scanner v3.0</p>
      </div>
    </div>

    <div class="summary-panel" *ngIf="settings">
      <span class="summary-item">TF: <b>{{settings.timeframes.join(', ')}}</b></span>
      <span class="summary-divider">|</span>
      <span class="summary-item">Vol: <b>{{settings.minVolMult}}x</b></span>
      <span class="summary-divider">|</span>
      <span class="summary-item">Market: <b>{{settings.marketType | uppercase}}</b></span>
    </div>

    <div class="status-panel">
      <div class="status-item">
        <span class="dot online"></span> Статус: <b>Online</b>
      </div>
      <button class="settings-trigger-btn" (click)="openSettings.emit()">
        ⚙️ Settings
      </button>
    </div>
  </div>
</div>
